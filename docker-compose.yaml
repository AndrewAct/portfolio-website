services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    image: apecee/portfolio_website:portfolio_website_frontend_v2_0.0.7
    expose:
      - "80"
    restart: always
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0

  backend:
    image: apecee/portfolio_website:portfolio_website_backend_0.0.20
    expose:
      - "8000"
    restart: always
    env_file:
      - ${BACKEND_ENV_FILE:-./backend.env}
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production

networks:
  default:
    driver: bridge
